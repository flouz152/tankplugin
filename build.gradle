buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net' }
        mavenCentral()
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:2.3-SNAPSHOT'
    }
}

apply plugin: 'net.minecraftforge.gradle.forge'

version = '1.0.0'
group = 'net.flouz.tankmod'
archivesBaseName = 'tankmod'

targetCompatibility = sourceCompatibility = 1.8

minecraft {
    version = '1.12.2-14.23.5.2859'
    runDir = 'run'
    mappings = 'stable_39'
}

dependencies {
}

def resourceTargets = ['mcmod.info']
def replaceProperties = [
        modid      : 'tankmod',
        name       : 'Tank Mod',
        description: 'Inventory toggle and auto-extinguish utilities',
        version    : project.version
]

processResources {
    inputs.properties replaceProperties
    filesMatching(resourceTargets) {
        expand replaceProperties
    }
}

jar {
    manifest {
        attributes(
                'Specification-Title'    : 'tankmod',
                'Specification-Version'  : project.version,
                'Specification-Vendor'   : 'Flouz',
                'Implementation-Title'   : project.name,
                'Implementation-Version' : project.version,
                'Implementation-Vendor'  : 'Flouz'
        )
    }
}
